services:
  - type: web
    name: playsight-api
    runtime: docker
    dockerfilePath: ./docker/api.Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: playsight-db
          property: connectionString
      - key: REDIS_URL
        sync: false

  - type: worker
    name: playsight-worker
    runtime: docker
    dockerfilePath: ./docker/worker.Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: playsight-db
          property: connectionString
      - key: REDIS_URL
        sync: false

databases:
  - name: playsight-db
    plan: free
